<!DOCTYPE html>
<html>
<head>
  <title>TitanX Robotics</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #050505, #000000);
      color: white;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
    }

    /* 🌌 Animated Background */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, cyan, purple, blue, cyan);
      opacity: 0.05;
      animation: moveBg 10s linear infinite;
      z-index: -1;
    }

    @keyframes moveBg {
      0% { transform: translate(-25%, -25%); }
      50% { transform: translate(0%, 0%); }
      100% { transform: translate(-25%, -25%); }
    }

    /* 🤖 LOGO */
    .logo {
      width: 300px;
      margin-top: 60px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 25px cyan);
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-25px); }
      100% { transform: translateY(0px); }
    }

    h1 {
      font-size: 45px;
      color: cyan;
      text-shadow: 0 0 20px cyan;
    }

    p {
      color: #aaa;
      font-size: 18px;
    }

    .section {
      padding: 60px 20px;
    }

    /* 🔥 CARD STYLE */
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 20px;
      margin: 15px;
      display: inline-block;
      width: 250px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 0 25px cyan;
    }

    /* 🔥 REGISTER BUTTON */
    .regbtn {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
      width: 250px;
      border: none;
      color: cyan;
      font-size: 18px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.3s;
      text-shadow: 0 0 10px cyan;
    }

    .regbtn:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 0 25px cyan;
    }

    h2 {
      color: cyan;
      margin-bottom: 20px;
    }

    /* 🌐 SOCIAL MEDIA */
    .socials{
      display:flex;
      justify-content:center;
      gap:25px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .socials img{
      width:50px;
      transition:0.3s;
      filter: drop-shadow(0 0 10px cyan);
    }

    .socials img:hover{
      transform: scale(1.2);
      filter: drop-shadow(0 0 25px cyan);
    }
  </style>
</head>

<body>

<!-- 🔐 Login check -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyArTaM2XXi8nSZCykIQi-yeq9zbb4sVauc",
  authDomain: "titanx-robotics.firebaseapp.com",
  projectId: "titanx-robotics",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  }
});
</script>
